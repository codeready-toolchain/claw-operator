apiVersion: claw.sandbox.redhat.com/v1alpha1
kind: Claw
metadata:
  name: instance
spec:
  credentials:
    - name: gemini
      type: apiKey
      secretRef:
        name: gemini-api-key
        key: api-key
      domain: "generativelanguage.googleapis.com"
      apiKey:
        header: x-goog-api-key
      provider: google
