apiVersion: openclaw.sandbox.redhat.com/v1alpha1
kind: Claw
metadata:
  name: instance
  namespace: default
spec:
  # GeminiAPIKey references a Secret containing the Gemini API key
  # Create the Secret first using the example in gemini-api-key-secret.yaml
  geminiAPIKey:
    name: gemini-api-key
    key: api-key
