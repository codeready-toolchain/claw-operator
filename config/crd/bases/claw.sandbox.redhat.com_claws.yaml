---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: claws.claw.sandbox.redhat.com
spec:
  group: claw.sandbox.redhat.com
  names:
    kind: Claw
    listKind: ClawList
    plural: claws
    singular: claw
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].reason
      name: Reason
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Claw is the Schema for the claws API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ClawSpec defines the desired state of Claw
            properties:
              credentials:
                description: Credentials configures proxy credential injection per
                  domain.
                items:
                  description: CredentialSpec defines a single credential entry for
                    proxy injection.
                  properties:
                    apiKey:
                      description: APIKey configures custom header injection. Required
                        when type is "apiKey".
                      properties:
                        header:
                          description: Header name where the API key is injected (e.g.,
                            "x-goog-api-key", "x-api-key")
                          minLength: 1
                          type: string
                        valuePrefix:
                          description: |-
                            ValuePrefix is prepended to the secret value before injection.
                            Examples: "Bot " (Discord), "Basic " (pre-encoded basic auth).
                          type: string
                      required:
                      - header
                      type: object
                    defaultHeaders:
                      additionalProperties:
                        type: string
                      description: |-
                        DefaultHeaders are injected on every proxied request for this credential,
                        in addition to the credential itself (e.g., "anthropic-version: 2023-06-01").
                      type: object
                    domain:
                      description: |-
                        Domain the proxy matches against the request Host header.
                        Exact match: "api.github.com". Suffix match: ".googleapis.com" (leading dot).
                        Optional for known providers (google, anthropic) — the operator infers the default domain.
                      type: string
                    gcp:
                      description: GCP configures GCP service account credential injection.
                        Required when type is "gcp".
                      properties:
                        location:
                          description: Location is the GCP region (e.g., us-central1)
                          minLength: 1
                          type: string
                        project:
                          description: Project is the GCP project ID
                          minLength: 1
                          type: string
                      required:
                      - location
                      - project
                      type: object
                    name:
                      description: Name uniquely identifies this credential entry.
                      minLength: 1
                      type: string
                    oauth2:
                      description: OAuth2 configures client credentials token exchange.
                        Required when type is "oauth2".
                      properties:
                        clientID:
                          description: ClientID for the OAuth2 client credentials
                            flow
                          minLength: 1
                          type: string
                        scopes:
                          description: Scopes requested during token exchange
                          items:
                            type: string
                          type: array
                        tokenURL:
                          description: TokenURL is the OAuth2 token endpoint
                          minLength: 1
                          type: string
                      required:
                      - clientID
                      - tokenURL
                      type: object
                    pathToken:
                      description: PathToken configures URL path token injection.
                        Required when type is "pathToken".
                      properties:
                        prefix:
                          description: Prefix is prepended before the token in the
                            URL path (e.g., "/bot" for Telegram)
                          minLength: 1
                          type: string
                      required:
                      - prefix
                      type: object
                    provider:
                      description: |-
                        Provider maps this credential to an OpenClaw LLM provider (e.g., "google", "anthropic", "openai", "openrouter").
                        When set, the controller configures gateway routing and generates the provider entry in openclaw.json.
                        When omitted, the credential is used for MITM forward proxy only (no provider entry).
                      type: string
                    secretRef:
                      description: |-
                        SecretRef references the Kubernetes Secret holding the credential value.
                        Not required for type "none" (proxy allowlist, no auth).
                      properties:
                        key:
                          description: Key is the key in the Secret's data map
                          minLength: 1
                          type: string
                        name:
                          description: Name is the name of the Secret
                          minLength: 1
                          type: string
                      required:
                      - key
                      - name
                      type: object
                    type:
                      description: Type selects the credential injection mechanism
                      enum:
                      - apiKey
                      - bearer
                      - gcp
                      - pathToken
                      - oauth2
                      - none
                      type: string
                  required:
                  - name
                  - type
                  type: object
                  x-kubernetes-validations:
                  - message: apiKey config is required when type is apiKey and provider
                      is not set
                    rule: self.type != 'apiKey' || has(self.apiKey) || has(self.provider)
                  - message: gcp config is required when type is gcp
                    rule: self.type != 'gcp' || has(self.gcp)
                  - message: pathToken config is required when type is pathToken
                    rule: self.type != 'pathToken' || has(self.pathToken)
                  - message: oauth2 config is required when type is oauth2
                    rule: self.type != 'oauth2' || has(self.oauth2)
                  - message: secretRef is required for this credential type
                    rule: self.type == 'none' || has(self.secretRef)
                type: array
            type: object
          status:
            description: ClawStatus defines the observed state of Claw
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the Claw's state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              gatewayTokenSecretRef:
                description: GatewayTokenSecretRef is the name of the Secret containing
                  the gateway authentication token
                type: string
              url:
                description: URL is the HTTPS URL for accessing the Claw instance
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
