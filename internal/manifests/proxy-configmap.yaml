apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-proxy-config
  labels:
    app: openclaw-proxy
data:
  # Entrypoint script that substitutes env vars into the nginx template
  # before starting nginx. nginx itself does not expand $VAR in config
  # files, so we use envsubst at startup.
  docker-entrypoint.sh: |
    #!/bin/sh
    set -e
    # Extract the cluster DNS resolver from /etc/resolv.conf so nginx
    # can resolve upstream hostnames at request time (not just startup).
    NAMESERVER=$(awk '/^nameserver/{print $2; exit}' /etc/resolv.conf)
    export NAMESERVER
    envsubst '${NAMESERVER} ${ANTHROPIC_API_KEY} ${OPENAI_API_KEY} ${GEMINI_API_KEY} ${OPENROUTER_API_KEY} ${GITHUB_TOKEN} ${TELEGRAM_BOT_TOKEN}' \
      < /etc/nginx/templates/default.conf.template \
      > /etc/nginx/conf.d/default.conf
    exec nginx -g 'daemon off;'

  default.conf.template: |
    # ---------------------------------------------------------------
    # Credential proxy for OpenClaw.
    #
    # Each upstream gets a location block that:
    #   1. Forwards the request to the real API endpoint
    #   2. Injects the correct auth header from env vars
    #   3. Restricts HTTP methods where appropriate
    #
    # OpenClaw calls this proxy via models.providers.*.baseUrl in
    # openclaw.json; it never receives the raw API keys.
    # ---------------------------------------------------------------

    # Resolve upstream hostnames at request time, not at startup.
    # ${NAMESERVER} is injected by the entrypoint from /etc/resolv.conf.
    resolver ${NAMESERVER} valid=30s ipv6=off;

    server {
        listen 8080 default_server;

        # LLM streaming (SSE) requires long timeouts and unbuffered
        # proxying so chunks flow through immediately.
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_connect_timeout 15s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        location / {
            return 403 '{"error":"no matching proxy route"}\n';
        }

        location = /healthz {
            return 200 'ok\n';
        }

        # ----------------------------------------------------------
        # LLM: Anthropic
        # ----------------------------------------------------------
        location /anthropic/ {
            limit_except POST { deny all; }

            set $upstream_anthropic api.anthropic.com;
            rewrite ^/anthropic/(.*) /$1 break;
            proxy_pass https://$upstream_anthropic;
            proxy_ssl_server_name on;

            proxy_set_header Host api.anthropic.com;
            proxy_set_header x-api-key "${ANTHROPIC_API_KEY}";
            proxy_set_header anthropic-version "2023-06-01";
            proxy_set_header X-Forwarded-For "";
        }

        # ----------------------------------------------------------
        # LLM: OpenAI
        # ----------------------------------------------------------
        location /openai/ {
            limit_except POST { deny all; }

            set $upstream_openai api.openai.com;
            rewrite ^/openai/(.*) /$1 break;
            proxy_pass https://$upstream_openai;
            proxy_ssl_server_name on;

            proxy_set_header Host api.openai.com;
            proxy_set_header Authorization "Bearer ${OPENAI_API_KEY}";
            proxy_set_header X-Forwarded-For "";
        }

        # ----------------------------------------------------------
        # LLM: Google Gemini (direct API key mode)
        # ----------------------------------------------------------
        location /gemini/ {
            limit_except POST { deny all; }

            set $upstream_gemini generativelanguage.googleapis.com;
            rewrite ^/gemini/(.*) /$1 break;
            proxy_pass https://$upstream_gemini;
            proxy_ssl_server_name on;

            proxy_set_header Host generativelanguage.googleapis.com;
            proxy_set_header x-goog-api-key "${GEMINI_API_KEY}";
            proxy_set_header X-Forwarded-For "";
        }

        # ----------------------------------------------------------
        # LLM: OpenRouter (OpenAI-compatible)
        # ----------------------------------------------------------
        location /openrouter/ {
            limit_except POST { deny all; }

            set $upstream_openrouter openrouter.ai;
            rewrite ^/openrouter/(.*) /api/$1 break;
            proxy_pass https://$upstream_openrouter;
            proxy_ssl_server_name on;

            proxy_set_header Host openrouter.ai;
            proxy_set_header Authorization "Bearer ${OPENROUTER_API_KEY}";
            proxy_set_header X-Forwarded-For "";
        }

        # ----------------------------------------------------------
        # GitHub API (read-only by default)
        # ----------------------------------------------------------
        location /github/ {
            limit_except GET HEAD OPTIONS { deny all; }

            set $upstream_github api.github.com;
            rewrite ^/github/(.*) /$1 break;
            proxy_pass https://$upstream_github;
            proxy_ssl_server_name on;

            proxy_set_header Host api.github.com;
            proxy_set_header Authorization "token ${GITHUB_TOKEN}";
            proxy_set_header User-Agent "openclaw-proxy";
            proxy_set_header X-Forwarded-For "";
        }

        # ----------------------------------------------------------
        # Telegram Bot API
        # ----------------------------------------------------------
        location /telegram/ {
            limit_except POST { deny all; }

            set $upstream_telegram api.telegram.org;
            rewrite ^/telegram/(.*) /bot${TELEGRAM_BOT_TOKEN}/$1 break;
            proxy_pass https://$upstream_telegram;
            proxy_ssl_server_name on;

            proxy_set_header Host api.telegram.org;
            proxy_set_header X-Forwarded-For "";
        }
    }
