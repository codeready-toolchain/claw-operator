apiVersion: apps/v1
kind: Deployment
metadata:
  name: CLAW_INSTANCE_NAME-device-pairing
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: claw-device-pairing
  template:
    metadata:
      labels:
        app.kubernetes.io/name: claw-device-pairing
    spec:
      serviceAccountName: CLAW_INSTANCE_NAME-device-pairing
      automountServiceAccountToken: true
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: device-pairing
          image: quay.io/xcoulon/claw-device-pairing:latest
          imagePullPolicy: Always
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CLAW_INSTANCE
              value: CLAW_INSTANCE_NAME
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 500m
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
