apiVersion: apps/v1
kind: Deployment
metadata:
  name: CLAW_INSTANCE_NAME
  labels:
    app: claw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claw
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: claw
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-config
          image: mirror.gcr.io/library/busybox:1.37
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              cp /config/operator.json /home/node/.openclaw/operator.json
              mkdir -p /home/node/.openclaw/workspace /home/node/.openclaw/.local /home/node/.openclaw/.cache /home/node/.openclaw/.config/codex
              [ -f /home/node/.openclaw/openclaw.json ] || cp /config/openclaw.json /home/node/.openclaw/openclaw.json
              [ -f /home/node/.openclaw/workspace/AGENTS.md ] || cp /config/AGENTS.md /home/node/.openclaw/workspace/AGENTS.md
              mkdir -p /home/node/.openclaw/workspace/skills/proxy
              cp /config/PROXY_SETUP.md /home/node/.openclaw/workspace/skills/proxy/SKILL.md
              if [ -f /config/KUBERNETES.md ]; then
                mkdir -p /home/node/.openclaw/workspace/skills/kubernetes
                cp /config/KUBERNETES.md /home/node/.openclaw/workspace/skills/kubernetes/SKILL.md
              fi
          resources:
            requests:
              memory: 32Mi
              cpu: 50m
            limits:
              memory: 64Mi
              cpu: 100m
          volumeMounts:
            - name: claw-home
              mountPath: /home/node/.openclaw
            - name: config
              mountPath: /config
        - name: wait-for-proxy
          image: mirror.gcr.io/library/busybox:1.37
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              TIMEOUT_SECONDS=120
              elapsed=0
              echo "[wait-for-proxy] waiting for CLAW_INSTANCE_NAME-proxy:8080 (timeout ${TIMEOUT_SECONDS}s)..."
              while ! nc -z CLAW_INSTANCE_NAME-proxy 8080 2>/dev/null; do
                elapsed=$((elapsed + 1))
                if [ "$elapsed" -ge "$TIMEOUT_SECONDS" ]; then
                  echo "[wait-for-proxy] ERROR: CLAW_INSTANCE_NAME-proxy:8080 not reachable after ${TIMEOUT_SECONDS}s"
                  exit 1
                fi
                if [ $((elapsed % 15)) -eq 0 ]; then
                  echo "[wait-for-proxy] still waiting... (${elapsed}s/${TIMEOUT_SECONDS}s)"
                fi
                sleep 1
              done
              echo "[wait-for-proxy] proxy is up (after ${elapsed}s)"
          resources:
            requests:
              memory: 16Mi
              cpu: 10m
            limits:
              memory: 32Mi
              cpu: 50m
      containers:
        - name: gateway
          image: ghcr.io/openclaw/openclaw:slim
          imagePullPolicy: IfNotPresent
          command:
            - node
            - /app/dist/index.js
            - gateway
            - run
          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
          env:
            - name: HOME
              value: /home/node
            - name: OPENCLAW_CONFIG_DIR
              value: /home/node/.openclaw
            - name: NODE_ENV
              value: production
            - name: OPENCLAW_PROXY_ACTIVE
              value: "1"
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: CLAW_INSTANCE_NAME-gateway-token
                  key: token
            - name: HTTP_PROXY
              value: http://CLAW_INSTANCE_NAME-proxy:8080
            - name: HTTPS_PROXY
              value: http://CLAW_INSTANCE_NAME-proxy:8080
            - name: http_proxy
              value: http://CLAW_INSTANCE_NAME-proxy:8080
            - name: https_proxy
              value: http://CLAW_INSTANCE_NAME-proxy:8080
            - name: NO_PROXY
              value: localhost,127.0.0.1,CLAW_INSTANCE_NAME-proxy
            - name: no_proxy
              value: localhost,127.0.0.1,CLAW_INSTANCE_NAME-proxy
            - name: NODE_USE_ENV_PROXY
              value: "1"
            - name: NPM_CONFIG_CACHE
              value: /home/node/.cache/npm
            - name: CODEX_HOME
              value: /home/node/.config/codex
            - name: NODE_EXTRA_CA_CERTS
              value: /etc/proxy-ca/ca.crt
            - name: SSL_CERT_FILE
              value: /etc/proxy-ca/ca.crt
            - name: REQUESTS_CA_BUNDLE
              value: /etc/proxy-ca/ca.crt
            - name: CURL_CA_BUNDLE
              value: /etc/proxy-ca/ca.crt
            - name: GIT_SSL_CAINFO
              value: /etc/proxy-ca/ca.crt
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: "1"
          startupProbe:
            tcpSocket:
              port: 18789
            failureThreshold: 60
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 18789
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 18789
            periodSeconds: 10
            timeoutSeconds: 10
          volumeMounts:
            - name: claw-home
              mountPath: /home/node/.openclaw
            - name: claw-home
              mountPath: /home/node/.local
              subPath: .local
            - name: claw-home
              mountPath: /home/node/.cache
              subPath: .cache
            - name: claw-home
              mountPath: /home/node/.config
              subPath: .config
            - name: tmp-volume
              mountPath: /tmp
            - name: proxy-ca
              mountPath: /etc/proxy-ca
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: claw-home
          persistentVolumeClaim:
            claimName: CLAW_INSTANCE_NAME-home-pvc
        - name: config
          configMap:
            name: CLAW_INSTANCE_NAME-config
        - name: tmp-volume
          emptyDir: {}
        - name: proxy-ca
          secret:
            secretName: CLAW_INSTANCE_NAME-proxy-ca
            items:
              - key: ca.crt
                path: ca.crt
