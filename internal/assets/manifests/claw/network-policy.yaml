apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: CLAW_INSTANCE_NAME-ingress
  labels:
    app: claw
spec:
  podSelector:
    matchLabels:
      app: claw
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              policy-group.network.openshift.io/ingress: ""
        - namespaceSelector:
            matchLabels:
              policy-group.network.openshift.io/host-network: ""
      ports:
        - port: 18789
          protocol: TCP
