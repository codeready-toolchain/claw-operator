apiVersion: apps/v1
kind: Deployment
metadata:
  name: claw
  labels:
    app: claw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claw
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: claw
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: patch-proxy
          image: ghcr.io/openclaw/openclaw:slim
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              set -e
              cp -r /app/dist/. /patched-dist/
              patched=0
              guard_pattern='mode[[:space:]]*===[[:space:]]*GUARDED_FETCH_MODE\.TRUSTED_ENV_PROXY[[:space:]]*&&[[:space:]]*hasProxyEnvConfigured\(\)'
              guard_files=$(grep -rEl "$guard_pattern" /patched-dist --include='*.js' 2>/dev/null || true)
              if [ -z "$guard_files" ]; then
                echo "[proxy-patch] ERROR: no files contain SSRF guard conditional — upstream may have changed" >&2
                exit 1
              fi
              for file in $guard_files; do
                sed -Ei "s|$guard_pattern|hasProxyEnvConfigured()|g" "$file"
                echo "[proxy-patch] Patched SSRF guard: $file"
                patched=$((patched + 1))
              done
              echo "[proxy-patch] Patched $patched file(s)"
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m
          volumeMounts:
            - name: patched-dist
              mountPath: /patched-dist
        - name: init-config
          image: mirror.gcr.io/library/busybox:1.37
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              cp /config/openclaw.json /home/node/.openclaw/openclaw.json
              mkdir -p /home/node/.openclaw/workspace
              cp /config/AGENTS.md /home/node/.openclaw/workspace/AGENTS.md
          resources:
            requests:
              memory: 32Mi
              cpu: 50m
            limits:
              memory: 64Mi
              cpu: 100m
          volumeMounts:
            - name: claw-home
              mountPath: /home/node/.openclaw
            - name: config
              mountPath: /config
      containers:
        - name: gateway
          image: ghcr.io/openclaw/openclaw:slim
          imagePullPolicy: IfNotPresent
          command:
            - node
            - /app/dist/index.js
            - gateway
            - run
          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
          env:
            - name: HOME
              value: /home/node
            - name: OPENCLAW_CONFIG_DIR
              value: /home/node/.openclaw
            - name: NODE_ENV
              value: production
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: claw-gateway-token
                  key: token
            - name: HTTP_PROXY
              value: http://claw-proxy:8080
            - name: HTTPS_PROXY
              value: http://claw-proxy:8080
            - name: http_proxy
              value: http://claw-proxy:8080
            - name: https_proxy
              value: http://claw-proxy:8080
            - name: NO_PROXY
              value: localhost,127.0.0.1,claw-proxy
            - name: no_proxy
              value: localhost,127.0.0.1,claw-proxy
            - name: NODE_USE_ENV_PROXY
              value: "1"
            - name: NODE_EXTRA_CA_CERTS
              value: /etc/proxy-ca/ca.crt
            - name: SSL_CERT_FILE
              value: /etc/proxy-ca/ca.crt
            - name: REQUESTS_CA_BUNDLE
              value: /etc/proxy-ca/ca.crt
            - name: CURL_CA_BUNDLE
              value: /etc/proxy-ca/ca.crt
            - name: GIT_SSL_CAINFO
              value: /etc/proxy-ca/ca.crt
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: "1"
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://127.0.0.1:18789/healthz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://127.0.0.1:18789/readyz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: patched-dist
              mountPath: /app/dist
            - name: claw-home
              mountPath: /home/node/.openclaw
            - name: tmp-volume
              mountPath: /tmp
            - name: proxy-ca
              mountPath: /etc/proxy-ca
              readOnly: true
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: patched-dist
          emptyDir: {}
        - name: claw-home
          persistentVolumeClaim:
            claimName: claw-home-pvc
        - name: config
          configMap:
            name: claw-config
        - name: tmp-volume
          emptyDir: {}
        - name: proxy-ca
          secret:
            secretName: claw-proxy-ca
            items:
              - key: ca.crt
                path: ca.crt
